<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Modern Digital Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
    <div class="Calculator">
            <div class="screen">
            <p class="blank"></p>
            </div>
            <div class="row-one">
                <button name="C" value="C" id="C">C</button>
                <button name="+/-" value="+/-" id="+/-">+/-</button>
                <button name="%" value="%" id="%">%</button>
                <button name="÷" value="÷" id="division-sign">÷</button>
            </div>
            <div class="row-two">
                <button name="7" value="7" id="seven">7</button>
                <button name="8" value="8" id="eight">8</button>
                <button name="9" value="9" id="nine">9</button>
                <button name="×" value="×" id="multiplication-sign">×</button>
            </div>
            <div class="row-three">
                <button name="4" value="4" id="four">4</button>
                <button name="5" value="5" id="five">5</button>
                <button name="6" value="6" id="six">6</button>
                <button name="-" value="-" id="minus-sign">-</button>
            </div>
            <div class="row-four">
                <button name="1" value="1" id="one">1</button>
                <button name="2" value="2" id="two">2</button>
                <button name="3" value="3" id="three">3</button>
                <button name="+" value="+" id="plus-sign">+</button>
            </div>
            <div class="row-five">
                <button name="help" value="help" id="help">Help</button>
                <button name="0" value="0" id="zero">0</button>
                <button name="." value="." id="comma">.</button>
                <button name="=" value="=" id="equals-sign">=</button>
            </div>
    </div>

    <script src="script.js"></script>
    </body>
</html>
